<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Civ VI History</title>
</head>
<body>
    <div class="header">
        <div class="logo-and-links">
            <img src="images/logo.png" alt="Stylized text illustrating civilixation 6 as a logo" class="logo">
            <ul class="header-links">
                <li>About</li>
                <li>Contact</li>
                <li>Steam</li>
                <li>Get Civ VI</li>
            </ul>
        </div>

        <div class="header-information">
            <div class="left-info">
                <div class="hero-text">
                    text
                </div>
                <div class="secondary-text">
                    text
                </div>
                <button>
                    Sign up
                </button>
            </div>
            <img src="" alt="blank image for now" class="header-image">
        </div>

    </div>

    <div class="content">
        <div class="leaders">
            <div class="content-title">My Favourite Leaders</div>
            <div class="leaders-and-infos">
                <div class="leader-info">
                    <img src="images/basil.png" alt="">
                    <p>Tagma</p>
                </div>
                <div class="leader-info">
                    <img src="images/simon.png" alt="">
                    <p>Mobility</p>
                </div>
                <div class="leader-info">
                    <img src="images/ambiorix.png" alt="">
                    <p>Rush</p>
                </div>
            </div>
        </div>

        <div class="quote">
            something quotey
        </div>

        <div class="call-to-action">
            some div here with a call to action. button nect to it
        </div>

    </div>

    <div class="footer">
        Copyright The Odin Project 2021
    </div>
</body>
</html>
